spring:
  datasource:
    url: jdbc:h2:mem:mealplanner-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  liquibase:
    enabled: false
    change-log: classpath:db/changelog/db.changelog-master.yaml

meal-planner:
  seed:
    enabled: false
