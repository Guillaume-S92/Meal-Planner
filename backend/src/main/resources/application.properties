spring.application.name=meal-planner-api
server.port=8080

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/meal_planner?createDatabaseIfNotExist=true&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

springdoc.swagger-ui.path=/swagger-ui.html

meal-planner.security.jwt-secret=${MEAL_PLANNER_JWT_SECRET:dev-change-me-before-production-secret}
meal-planner.security.token-validity-hours=${MEAL_PLANNER_TOKEN_VALIDITY_HOURS:12}
meal-planner.security.bootstrap-admin.enabled=${MEAL_PLANNER_BOOTSTRAP_ADMIN_ENABLED:false}
meal-planner.security.bootstrap-admin.username=${MEAL_PLANNER_ADMIN_USERNAME:admin}
meal-planner.security.bootstrap-admin.password=${MEAL_PLANNER_ADMIN_PASSWORD:}
